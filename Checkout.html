<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Loja Sagrado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .product-item {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .product-item img {
            max-width: 100px;
            height: auto;
        }
        .product-item .product-details {
            margin-left: 15px;
            flex-grow: 1;
        }
        .product-item .product-name {
            font-weight: bold;
            position: relative;
            top: 9px;
        }
        .product-item .product-price {
            color: #7B3083;
            font-size: 1.2rem;
            display: inline-block;
            margin-right: 10px;
            position: relative;
            top: 10px;
        }
        .product-item .quantity-adjust {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
        }
        .product-item .quantity-adjust button {
            background-color: #7B3083;
            color: white;
            border: none;
            padding: 5px 10px;
            margin: 0 5px;
            border-radius: 5px;
        }
        .product-item .quantity-adjust button:hover {
            background-color: #ce9647;
        }
        .btn-proceed {
            background-color: #7B3083;
            color: white;
            font-size: 1.2rem;
            padding: 10px 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .btn-proceed:hover {
            background-color: #ce9647;
        }
        .footer {
            width: 100%;
            background-color: #7B3083;
            color: white;
            padding: 15px 0;
            text-align: center;
            margin-top: 40px;
        }
        .delivery-fee, .payment-methods {
            font-weight: bold;
            margin-top: 10px;
        }
        .payment-methods input[type="radio"] {
            margin-right: 10px;
        }
        .modal-header {
            background-color: #7B3083;
            color: white;
        }
        .modal-footer {
            background-color: #f8f9fa;
        }
        .total-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
            position: relative;
            top: 250px;
        }
        .total-container h4,
        .total-container .btn-proceed {
            margin: 0 15px;
        }
        .mt-4 {
            margin-top: 1.5rem!important;
            position: relative;
            bottom: 80px;
        }
        /* Diminuindo a largura do campo de CEP */
        #cep {
            width: 150px; /* Definindo largura personalizada para o campo CEP */
        }
    </style>
</head>
<body>
    <!-- Header da Loja -->
    <header class="bg-dark text-white py-3">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="m-0">Loja Sagrado</h1>
                    <p class="m-0">Produtos religiosos com qualidade e respeito</p>
                </div>
                <div>
                    <a href="index.html" class="text-white me-3">Início</a>
                    <a href="cart.html" class="text-white">Carrinho</a>
                </div>
            </div>
        </div>
    </header>

    <div class="container mt-5">
        <h2>Resumo da Compra</h2>
        <div id="cartItemsList"></div>
        <div class="total-container">
            <h4>Total: <span id="cartTotal">R$ 0.00</span></h4>
            <button class="btn btn-proceed" onclick="finalizeCheckout()">Finalizar Compra</button>
        </div>

        <!-- Campo para Digitar o CEP -->
        <div class="mt-4">
            <label for="cep" class="form-label">Digite o CEP de entrega</label>
            <input type="text" class="form-control" id="cep" placeholder="CEP (ex: 12345-678)" onkeyup="calcularTaxaEntrega()" required>
            <div class="delivery-fee">
                <strong>Taxa de Entrega: R$ <span id="taxaEntrega">0,00</span></strong>
            </div>
        </div>

        <!-- Métodos de Pagamento -->
        <div class="mt-4 payment-methods">
            <h5>Selecione o Método de Pagamento</h5>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="paymentMethod" id="paymentCard" value="cartao" onclick="showCreditCardModal()">
                <label class="form-check-label" for="paymentCard">
                    Cartão de Crédito/Débito
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="paymentMethod" id="paymentBoleto" value="boleto">
                <label class="form-check-label" for="paymentBoleto">
                    Boleto Bancário
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="paymentMethod" id="paymentPix" value="pix">
                <label class="form-check-label" for="paymentPix">
                    PIX
                </label>
            </div>
        </div>

        <!-- Modal para Cartão de Crédito -->
        <div class="modal fade" id="creditCardModal" tabindex="-1" aria-labelledby="creditCardModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="creditCardModalLabel">Informações do Cartão de Crédito</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="cardName" class="form-label">Nome Impresso no Cartão</label>
                            <input type="text" class="form-control" id="cardName" placeholder="Nome no Cartão" required>
                        </div>
                        <div class="mb-3">
                            <label for="cardNumber" class="form-label">Número do Cartão</label>
                            <input type="text" class="form-control" id="cardNumber" placeholder="1234 5678 9012 3456" required>
                        </div>
                        <div class="mb-3">
                            <label for="cardExpiry" class="form-label">Validade</label>
                            <input type="text" class="form-control" id="cardExpiry" placeholder="MM/AA" required>
                        </div>
                        <div class="mb-3">
                            <label for="cardCVV" class="form-label">CVV</label>
                            <input type="text" class="form-control" id="cardCVV" placeholder="123" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                        <button type="button" class="btn btn-primary" onclick="confirmPayment()">Confirmar Pagamento</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2025 Loja Sagrado - Todos os Direitos Reservados</p>
    </div>

    <script>
        // Verifica se há dados no localStorage
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        let cartTotal = 0;
        let deliveryFee = 0;

        // Função para renderizar os itens no carrinho
        function renderCartItems() {
            let cartItemsList = document.getElementById('cartItemsList');
            cartItemsList.innerHTML = ''; // Limpa os itens do carrinho

            cartTotal = 0;
            cart.forEach((item, index) => {
                cartTotal += item.price * item.quantity;
                let itemDiv = document.createElement('div');
                itemDiv.classList.add('product-item');
                itemDiv.innerHTML = `

                    <img src="https://placehold.co/40x40" alt="${item.name}">
                    <div class="product-details">
                        <p class="product-name">${item.name}</p>
                    </div>
                    <div class="d-flex align-items-center">
                        <p class="product-price">R$ ${item.price.toFixed(2)}</p>
                        <div class="quantity-adjust">
                            <button onclick="adjustQuantity(${index}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="adjustQuantity(${index}, 1)">+</button>
                        </div>
                    </div>
                `;
                cartItemsList.appendChild(itemDiv);
            });

            // Atualiza o total, incluindo a taxa de entrega
            const totalWithFee = cartTotal + deliveryFee;
            document.getElementById('cartTotal').innerText = `R$ ${totalWithFee.toFixed(2)}`;
        }

        // Função para ajustar a quantidade de um item
        function adjustQuantity(index, delta) {
            const item = cart[index];
            if (item) {
                item.quantity += delta;
                if (item.quantity < 1) {
                    item.quantity = 1; // Impede que a quantidade seja menor que 1
                }
                // Atualiza o carrinho no localStorage
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCartItems(); // Re-renderiza os itens
            }
        }

        // Função para calcular a taxa de entrega com base no CEP
        function calcularTaxaEntrega() {
            const cep = document.getElementById("cep").value.replace(/\D/g, ''); // Remover qualquer caracter não numérico

            if (cep.length === 8) { // Verifica se o CEP tem 8 dígitos
                let taxa = 0;

                // Exemplo de lógica de taxa de entrega
                if (cep.startsWith("12") || cep.startsWith("13")) {
                    taxa = 10.00;
                } else if (cep.startsWith("14") || cep.startsWith("15")) {
                    taxa = 15.00;
                } else {
                    taxa = 20.00; // Para outros CEPs
                }

                deliveryFee = taxa; // Atualiza a taxa de entrega
                document.getElementById("taxaEntrega").textContent = taxa.toFixed(2);
                renderCartItems(); // Recalcula o total
            } else {
                deliveryFee = 0; // Se o CEP for inválido, a taxa é 0
                document.getElementById("taxaEntrega").textContent = "0,00";
                renderCartItems(); // Recalcula o total
            }
        }

        // Função para exibir o modal de Cartão de Crédito
        function showCreditCardModal() {
            if (document.getElementById("paymentCard").checked) {
                // Abre o modal de cartão de crédito
                const myModal = new bootstrap.Modal(document.getElementById('creditCardModal'));
                myModal.show();
            }
        }

        // Função para confirmar o pagamento
        function confirmPayment() {
            alert("Pagamento confirmado! Detalhes do pagamento serão processados.");
            const myModal = bootstrap.Modal.getInstance(document.getElementById('creditCardModal'));
            myModal.hide();
        }

        // Função para finalizar a compra
        function finalizeCheckout() {
            const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
            alert(`Compra finalizada! Método de pagamento: ${paymentMethod}`);
            localStorage.removeItem("cart"); // Limpa o carrinho após a finalização
            window.location.href = "index.html"; // Redireciona para a página inicial
        }

        // Renderiza os itens no carrinho quando a página for carregada
        renderCartItems();
    </script>
</body>
</html>
