<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Sagrado - Delivery de Produtos Religiosos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #3b3b58;
            --secondary-color: #f8c471;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin-top: 60px;
        }

        .navbar {
            background-color: var(--primary-color) !important;
        }

        .navbar-brand, .nav-link {
            color: var(--secondary-color) !important;
        }

        .card-body {
            text-align: center;
        }

        .footer {
            background-color: var(--primary-color);
            color: white;
            padding: 30px 0;
            text-align: center;
        }

        .checkout-container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-finalizar {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            font-size: 16px;
        }

        .btn-finalizar:hover {
            background-color: var(--secondary-color);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Loja Sagrado</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Sobre</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contato</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="checkout.html">🛒 Carrinho (<span id="cart-count">0</span>)</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Banner -->
    <div class="banner">
        <div class="address-input-container">
            <h3>Digite seu Endereço de Entrega</h3>
            <input type="text" class="form-control" placeholder="Digite seu endereço" required>
            <button class="btn btn-primary">Confirmar Endereço</button>
        </div>
    </div>
    <!-- Checkout -->
    <div class="container mt-5">
        <div class="checkout-container">
            <h3 class="text-center mb-4">Finalizar Compra</h3>
            <ul class="list-group mb-3" id="checkoutItems"></ul>
            <h5 class="mt-3">Total: <span id="totalPrice">R$ 0,00</span></h5>
            <button class="btn btn-finalizar mt-3" onclick="finalizarCompra()">Confirmar Pedido</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2025 Loja Sagrado - Todos os Direitos Reservados</p>
        <a href="#">Política de Privacidade</a>
        <a href="#">Termos de Serviço</a>
        <a href="#">Ajuda</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            atualizarContadorCarrinho();
            carregarCarrinho();
        });

        function adicionarAoCarrinho(nome, preco) {
            let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
            let itemExistente = carrinho.find(item => item.nome === nome);

            if (itemExistente) {
                itemExistente.quantidade += 1;
            } else {
                carrinho.push({ nome, preco, quantidade: 1 });
            }

            localStorage.setItem("carrinho", JSON.stringify(carrinho));
            atualizarContadorCarrinho();
        }

        function atualizarContadorCarrinho() {
            let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
            document.getElementById("cart-count").textContent = carrinho.length;
        }

        function carregarCarrinho() {
            let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
            let listaItens = document.getElementById("checkoutItems");
            let total = 0;
            listaItens.innerHTML = "";

            if (carrinho.length === 0) {
                listaItens.innerHTML = "<li class='list-group-item text-center'>Seu carrinho está vazio.</li>";
                return;
            }

            carrinho.forEach(item => {
                total += item.preco * item.quantidade;
                listaItens.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span>${item.nome} (x${item.quantidade})</span>
                        <strong>R$ ${item.preco.toFixed(2)}</strong>
                    </li>
                `;
            });

            document.getElementById("totalPrice").textContent = `R$ ${total.toFixed(2)}`;
        }

        function finalizarCompra() {
            alert("Compra finalizada com sucesso!");
            localStorage.removeItem("carrinho");
            window.location.reload();
        }
    </script>

</body>
</html>
