<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Produtos Religiosos</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background-color: #fafafa;
            color: #333;
            overflow: hidden; /* Impede a rolagem do body */
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #3B0F5B;
            color: white;
            padding: 10px; /* Reduzido para economizar espaço */
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .header-container {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: center; /* Center-align the text */
            position: relative;
            left: 0; /* Reset left position */
        }
        .main-content {
            padding: 60px 10px 60px; /* Espaço para a barra superior e inferior */
            text-align: center;
            overflow-y: hidden; /* Impede a rolagem vertical */
            height: calc(100vh - 120px); /* Altura total menos a altura da barra superior e inferior */

        }
        .banner-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 10px; /* Reduzido para economizar espaço */
            border: 1px solid #DAA520;
        }
        .banner {
            width: 100%;
            max-height: 200px; /* Diminuído para caber na tela */
            border-radius: 10px;
            object-fit: cover;
        }
        .small-banners {
            display: flex;
            justify-content: center;
            gap: 10px; /* Espaçamento entre os banners menores */
            margin-bottom: 10px; /* Margem inferior */
        }
        .small-banner {
            width: 48%; /* Largura dos banners menores */
            max-height: 100px; /* Altura máxima dos banners menores */
            border-radius: 10px;
            object-fit: cover;
        }
        .carousel {
            margin-top: 20px;
            text-align: center;
        }
        .carousel-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
            .carousel-container {
                display: flex;
                overflow-x: auto; /* Permite rolagem horizontal */
                padding: 10px 0;
                scroll-behavior: smooth; /* Suaviza a rolagem */

        }
        .carousel-item {
            flex: 0 0 auto; /* Impede que os itens encolham */
            width: 80px; /* Largura dos ícones */
            height: 80px; /* Altura dos ícones */
            margin-right: 10px; /* Espaçamento entre os ícones */
            border-radius: 50%; /* Ícones redondos */
            overflow: hidden; /* Esconde o excesso */
            border: 2px solid #DAA520; /* Borda dourada */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white; /* Fundo branco para os ícones */
        }
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ajusta a imagem para cobrir o ícone */
        }
        .carousel-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .carousel-button {
            background-color: #3B0F5B;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .categories {
            display: flex;
            justify-content: center;
            gap: 10px; /* Reduzido para economizar espaço */
            background-color: #3B0F5B;
            color: #DAA520;
            padding: 5px; /* Reduzido para economizar espaço */
            border-radius: 10px;
            margin: 10px;
            font-weight: bold;
            position: relative;
            top: 20px;
        }
        .categories span {
            color: #DAA520;
            cursor: pointer;
            font-weight: bold;
        }
        .products {
            width: 100%;
            padding: 10px;
            position: relative;
            top: 10px;
            left: -10px;
            overflow-x: auto; /* Permite rolagem horizontal */
        }
        .product-table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        .product-table td {
            padding: 10px; /* Reduzido para economizar espaço */
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .product-table img {
            width: 80px; /* Diminuído para caber na tela */
            height: 80px; /* Diminuído para caber na tela */
            object-fit: cover;
            border-radius: 10px;
        }
        @media (max-width: 600px) {
            .header {
                font-size: 16px;
            }
         @media (max-width: 768px) {
            .signup-container {
                padding: 20px; /* Menos padding em telas menores */
            }
            .product-table td {
                padding: 8px; /* Reduzido para economizar espaço */
            }
            .categories {
                flex-wrap: wrap;
            }
            .small-banner {
                width: 100%; /* Banners menores ocupam 100% em telas pequenas */
            }
            .carousel-item {
                width: 55px; /* Ícones menores em telas pequenas */
                height: 55px;
                position: relative;
                top: 10px;
            }
            .carousel-text {
                display: flex;
                justify-content: center;
                gap: 10px; /* Reduzido para economizar espaço */
                background-color: #3B0F5B;
                color: #DAA520;
                padding: 5px; /* Reduzido para economizar espaço */
                border-radius: 10px;
                margin: 10px;
                font-weight: bold;
                position: relative;
                top: 10px; 
            }
        }
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #3B0F5B;
            padding: 10px 0;
            border-top: 2px solid #DAA520;
            z-index: 9999;
        }
        .bottom-nav a {
            text-decoration: none;
            color: white;
            text-align: center;
        }
        .bottom-nav i {
            display: block;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .bottom-nav span {
            font-weight: bold;
            font-size: 12px;
        }
        .bottom-nav a:hover {
            color: #DAA520;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-container">
            <h1 style="font-size: 12px; margin: 0;color: #DAA520; font-weight: bold;">Rua da Amargura, 7 ▼</h1>
        </div>
    </div>
    <div class="main-content">
        <div class="banner-container">
            <img class="banner" src="https://static.vecteezy.com/ti/vetor-gratis/p1/2707512-fundo-roxo-e-dourado-luxuoso-vetor.jpg" alt="Banner da Loja">
        </div>
        <div class="small-banners">
            <img class="small-banner" src="https://static.vecteezy.com/ti/vetor-gratis/p1/2707512-fundo-roxo-e-dourado-luxuoso-vetor.jpg" alt="Banner Menor 1">
            <img class="small-banner" src="https://static.vecteezy.com/ti/vetor-gratis/p1/2707512-fundo-roxo-e-dourado-luxuoso-vetor.jpg" alt="Banner Menor 2">
        </div>
        <div class="carousel">
            <div class="carousel-text">Famosos na Sagrado</div>
            <div class="carousel-container" id="carouselContainer" style="width: 270px; margin: 0 auto;">
                <div class="carousel-item">
                    <img src="https://via.placeholder.com/80" alt="Estabelecimento 1">
                </div>
                <div class="carousel-item">
                    <img src="https://via.placeholder.com/80" alt="Estabelecimento 2">
                </div>
                <div class="carousel-item">
                    <img src="https://via.placeholder.com/80" alt="Estabelecimento 3">
                </div>
                <div class="carousel-item">
                    <img src="https://via.placeholder.com/80" alt="Estabelecimento 4">
                </div>
                <div class="carousel-item">
                    <img src="https://via.placeholder.com/80" alt="Estabelecimento 5">
                </div>
            </div>
        </div>
        <div class="categories">
            <span>Velas</span>
            <span>Incensos</span>
            <span>Imagens</span>
            <span>Livros</span>
        </div>
        <div class="products">
            <div style="overflow-x: auto;">
                <table class="product-table">
                    <tr>
                        <td><img src="loja1.jpg" alt="loja 1"></td>
                        <td>Casa da Cigana</td>
                        <td>2,0 km</td>
                    </tr>
                    <tr>
                        <td><img src="loja2.jpg" alt="loja 2"></td>
                        <td>Lua de Prata</td>
                        <td>1,5 km</td>
                    </tr>
                    <tr>
                        <td><img src="loja3.jpg" alt="loja 3"></td>
                        <td>Xangô da Pedreira</td>
                        <td>1,0 km</td>
                    </tr>
                    <tr>
                        <td><img src="loja4.jpg" alt="loja 4"></td>
                        <td>Casa de Artigos Religiosos</td>
                        <td>1,7 km</td>
                    </tr>
                    <tr>
                        <td><img src="loja5.jpg" alt="loja 5"></td>
                        <td>Casa de L'Ogun</td>
                        <td>1,3 km</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <div class="bottom-nav">
        <a href="#home">
            <img src="inicio.png" width="25px"><br>
        </a>
        <a href="#search">
            <img src="busca.png" width="25px"><br>
        </a>
        <a href="#orders">
            <img src="carrinho_de_compras.png" width="25px"><br>
        </a>
        <a href="#user">
            <img src="usuario.png" width="25px"><br>
        </a>
    </div>

    <script>
        const carouselContainer = document.getElementById('carouselContainer');
        const prevButton = document.getElementById('prevButton');
        const nextButton = document.getElementById('nextButton');
        let scrollAmount = 0;
        const itemWidth = 90; // Largura do item + margem (80px + 10px)

        nextButton.addEventListener('click', () => {
            if (scrollAmount < (carouselContainer.scrollWidth - carouselContainer.clientWidth)) {
                scrollAmount += itemWidth * 3; // Avança 3 ícones
                carouselContainer.scrollTo({
                    left: scrollAmount,
                    behavior: 'smooth'
                });
            }
        });

        prevButton.addEventListener('click', () => {
            if (scrollAmount > 0) {
                scrollAmount -= itemWidth * 3; // Retrocede 3 ícones
                carouselContainer.scrollTo({
                    left: scrollAmount,
                    behavior: 'smooth'
                });
            }
        });
    </script>
</body>
</html>
