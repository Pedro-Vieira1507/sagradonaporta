<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Sagrado - Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #7B3083;
            --secondary-color: #ce9647;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 0;
        }
        .main-content {
            flex: 1;
            margin-left: 270px;
            padding-top: 60px;
        }
        .navbar {
            background-color: var(--primary-color) !important;
        }
        .navbar-brand, .nav-link {
            color: var(--secondary-color) !important;
        }
        .navbar-brand:hover, .nav-link:hover {
            color: #fff !important;
        }
        .sidebar {
            position: fixed;
            top: 50px;
            left: 0;
            width: 250px;
            height: 100%;
            background-color: var(--primary-color);
            padding: 20px;
            border-radius: 0 0px 0px 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            color: white;
        }
        .sidebar h4 {
            margin-bottom: 15px;
        }
        .sidebar .filter-label {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .sidebar .category-item, .sidebar .price-item {
            color: var(--secondary-color);
            cursor: pointer;
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 10px;
        }
        .sidebar .category-item:hover, .sidebar .price-item:hover {
            color: white;
            background-color: var(--primary-color);
        }
        .product-card {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
        }
        .product-card img {
            max-height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .product-card h5 {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .product-card .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
        }
        .product-card .btn:hover {
            background-color: var(--secondary-color);
        }
        .footer {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 15px 0;
            text-align: center;
            z-index: 1000;
            margin-top: auto;
        }
        .footer a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .footer-columns {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .footer-column {
            flex: 1;
            min-width: 200px;
            padding: 10px;
        }
        .footer-column a {
            display: block;
            margin-bottom: 10px;
            color: #007bff;
            text-decoration: none;
        }
        .footer-column a:hover {
            text-decoration: underline;
        }
        .category-item{
            line-height: 1.0;
        }
        .nav-link{
            line-height: 0.5;
        }
        .directed{
            position: relative;
            top: 130px;
            left: -300px;
        }
        .filter-label{
            color: #000;
        }
        /* Estiliza a faixa do input range */
        input[type="range"] {
            -webkit-appearance: none;
            width: 62%;
            height: 6px;
            background: #ce9647; /* Dourado */
            border-radius: 5px;
            outline: none;
            opacity: 0.9;
            transition: opacity .2s;
        }

        /* Estiliza o botão deslizante do range */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #000;
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #ce9647; /* Dourado */
            border-radius: 50%;
            cursor: pointer;
        }

        /* Cor do valor do preço */
        #priceValue {
            color: #ce9647;
            font-weight: bold;
        }
        /* Estilo do modal */
        .modal-content {
            background-color: #f8f9fa;
            color: #333;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Loja Sagrado</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Botão de Carrinho -->
            <button class="btn btn-transparent position-relative" style="left: 1090px;" data-bs-toggle="modal" data-bs-target="#cartModal">
                <i class="bi bi-cart" style="color: #ce9647;"></i>
                <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    0 <!-- Número de itens no carrinho -->
                </span>
            </button>            
            <button class="btn border-0 bg-transparent position-relative" style="left: 1010px">
                <i class="bi bi-person" style="color: #ce9647; font-size: 1.5rem;"></i>
            </button>                      

            <div class="collapse navbar-collapse" id="navbarNav">
                
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="container mt-1">
            <div class="row row-cols-1 row-cols-md-4 g-4">
                <!-- Produto 1 -->
                <div class="col">
                    <div class="product-card">
                        <img src="https://placehold.co/40x40" class="card-img-top" alt="Produto 1">
                        <h5>Vela 7 dias orixá</h5>
                        <p><strong>R$ 8,90</strong></p>
                        <button class="btn btn-primary" onclick="addToCart('Vela 7 dias orixá', 8.90)">Comprar</button>
                    </div>
                </div>

                <!-- Produto 2 -->
                <div class="col">
                    <div class="product-card">
                        <img src="https://placehold.co/40x40" class="card-img-top" alt="Produto 2">
                        <h5>Vela 7 horas 5und</h5>
                        <p><strong>R$ 11,90</strong></p>
                        <button class="btn btn-primary" onclick="addToCart('Vela 7 horas 5und', 11.90)">Comprar</button>
                    </div>
                </div>

                <!-- Produto 3 -->
                <div class="col">
                    <div class="product-card">
                        <img src="https://placehold.co/40x40" class="card-img-top" alt="Produto 3">
                        <h5>Vela N5 8und</h5>
                        <p><strong>R$ 9,90</strong></p>
                        <button class="btn btn-primary" onclick="addToCart('Vela N5 8und', 9.90)">Comprar</button>
                    </div>
                </div>

                <!-- Produto 4 -->
                <div class="col">
                    <div class="product-card">
                        <img src="https://placehold.co/40x40" class="card-img-top" alt="Produto 4">
                        <h5>Vela N6 8und</h5>
                        <p><strong>R$ 10,90</strong></p>

                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal Carrinho -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="cartModalLabel">Carrinho de Compras</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="cartItemsList"></div>
                    <hr>
                    <div id="cartTotal">
                        <strong>Total: R$ 0.00</strong>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" class="btn btn-primary" onclick="finalizarCompra()">Finalizar Compra</button>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <div class="footer-columns">
            <div class="footer-column">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="Home_page.html">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Produtos</a>
                    </li>
                    <li class="nav-item">

                    </li>
                    <li class="nav-item">

                    </li>
                </ul>
            </div>
            <div class="footer-column">
                <p class="directed">© 2025 Loja Sagrado - Todos os Direitos Reservados</p>
            </div>
        </div>
    </div>
    <script>
        let cart = [];
        let cartCount = 0;

        function addToCart(name, price) {
            let item = cart.find(i => i.name === name);
            if (item) {
                item.quantity++;
            } else {
                cart.push({ name, price, quantity: 1 });
            }
            updateCart();
        }

        function updateCart() {
            // Atualiza o número de itens no carrinho
            cartCount = cart.reduce((acc, item) => acc + item.quantity, 0);
            document.getElementById('cartCount').innerText = cartCount;

            // Atualiza o modal com os itens do carrinho
            let cartItemsList = document.getElementById('cartItemsList');
            cartItemsList.innerHTML = ''; // Limpa a lista de produtos

            let totalPrice = 0;
            cart.forEach(item => {
                totalPrice += item.price * item.quantity;

                let itemDiv = document.createElement('div');
                itemDiv.classList.add('d-flex', 'justify-content-between', 'align-items-center');
                itemDiv.innerHTML = `
                    <div>
                        <strong>${item.name}</strong><br>
                        <small>R$ ${item.price.toFixed(2)}</small>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity('${item.name}', -1)">-</button>
                        <span>${item.quantity}</span>
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity('${item.name}', 1)">+</button>
                    </div>
                `;
                cartItemsList.appendChild(itemDiv);
            });

            // Atualiza o total no modal
            document.getElementById('cartTotal').innerHTML = `<strong>Total: R$ ${totalPrice.toFixed(2)}</strong>`;
        }

        function updateQuantity(name, delta) {
            let item = cart.find(i => i.name === name);
            if (item) {
                item.quantity = Math.max(1, item.quantity + delta);  // Evita quantidade negativa
            }
            updateCart();
        }

        function finalizarCompra() {
            alert("Compra finalizada!");
            cart = [];
            updateCart();
        }
        function finalizarCompra() {
    if (cart.length === 0) {
        alert("O carrinho está vazio. Adicione itens antes de finalizar a compra.");
        return;
    }

    // Log para verificar se a função está sendo chamada
    console.log("Finalizando compra...");

    // Salvar os itens do carrinho no localStorage (para persistência)
    localStorage.setItem('cart', JSON.stringify(cart));

    // Calcular o total
    let totalPrice = cart.reduce((acc, item) => acc + item.price * item.quantity, 0);

    // Exibir alerta de finalização de compra
    alert(`Compra finalizada! Total: R$ ${totalPrice.toFixed(2)}. Você será redirecionado para o checkout.`);

    // Limpar o carrinho após a compra
    cart = [];
    updateCart();  // Atualiza a interface do carrinho (limpa o modal)

    // Redirecionar para a página de checkout
    window.location.href = "checkout.html";  // Certifique-se de que o caminho está correto
}

    </script>
</body>
